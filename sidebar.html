<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg-color: #0f172a;
        --surface: rgba(255, 255, 255, 0.05);
        --surface-border: rgba(255, 255, 255, 0.1);
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --error: #ef4444;
        --success: #10b981;
      }
      
      body {
        margin: 0;
        padding: 16px;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text);
      }
      
      h2 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-top: 0;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      h2 span {
        color: var(--primary);
      }

      /* Tabs */
      .tabs {
        display: flex;
        border-bottom: 1px solid var(--surface-border);
        margin-bottom: 16px;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 8px;
        cursor: pointer;
        font-size: 0.9rem;
        color: var(--text-muted);
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }
      .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
        font-weight: 600;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--surface-border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      select, input[type="text"], input[type="datetime-local"] {
        width: 100%;
        background: rgba(0,0,0,0.2);
        border: 1px solid var(--surface-border);
        border-radius: 8px;
        padding: 10px;
        color: var(--text);
        font-family: inherit;
        font-size: 0.9rem;
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      select { appearance: none; }
      select:focus, input[type="text"]:focus, input[type="datetime-local"]:focus { border-color: var(--primary); }
      select option { background-color: var(--bg-color); }
      
      /* Webkit DateTime picker calendar icon fix */
      ::-webkit-calendar-picker-indicator {
          filter: invert(1);
          cursor: pointer;
      }

      .toggle-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--surface-border);
      }
      .toggle-container label { margin-bottom: 0; cursor: pointer; color: var(--text); }
      
      .btn-group {
        display: flex;
        gap: 8px;
      }
      
      button {
        flex: 1;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      button:hover:not(:disabled) {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      
      .btn-secondary {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--surface-border);
      }
      .btn-secondary:hover:not(:disabled) {
        background: rgba(255,255,255,0.1);
        box-shadow: none;
      }
      
      .full-btn {
        width: 100%;
        margin-top: 8px;
      }

      .variables {
        font-family: monospace;
        font-size: 0.8rem;
        color: #cbd5e1;
        background: rgba(0,0,0,0.2);
        padding: 8px;
        border-radius: 6px;
        word-break: break-all;
      }

      .status {
        margin-top: 12px;
        font-size: 0.85rem;
        text-align: center;
        padding: 8px;
        border-radius: 6px;
      }
      .status.error { color: var(--error); background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
      .status.success { color: var(--success); background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }
      .status.loading { color: var(--text-muted); }

      .loader {
        border: 3px solid var(--surface-border);
        border-top: 3px solid white;
        border-radius: 50%;
        width: 14px;
        height: 14px;
        animation: spin 1s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 8px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .hidden { display: none !important; }
      .custom-select-wrapper { position: relative; }
      .custom-select-wrapper::after {
        content: '▼'; font-size: 0.7rem; color: var(--text-muted);
        position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none;
      }
      
      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 16px;
      }
      .stat-box {
        background: rgba(0,0,0,0.2);
        border-radius: 8px;
        padding: 12px;
        text-align: center;
      }
      .stat-val { font-size: 1.5rem; font-weight: 600; }
      .stat-lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
      
      .schedule-container {
        margin-top: 12px;
        border-top: 1px solid var(--surface-border);
        padding-top: 12px;
      }
    </style>
  </head>
  <body>
    <h2>Mail Merge <span>Pro</span></h2>
    
    <div class="tabs">
      <div class="tab active" data-target="setup">Merge Setup</div>
      <div class="tab" data-target="analytics">Analytics</div>
    </div>

    <!-- SETUP TAB -->
    <div id="setup" class="tab-content active">
      <div class="card">
        <label>Detected Columns</label>
        <div id="variablesList" class="variables">Loading...</div>
        <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; margin-bottom: 0;">
          Add <code>CC</code>, <code>BCC</code>, or <code>Attachment</code> columns to automatically use them!
        </p>
      </div>

      <div class="card">
        <label for="draftSelect">Select Gmail Draft</label>
        <div class="custom-select-wrapper">
          <select id="draftSelect">
            <option value="">Loading drafts...</option>
          </select>
        </div>

        <div id="senderNameContainer" style="margin-top: 12px; border-top: 1px solid var(--surface-border); padding-top: 12px;">
          <label for="senderName">Sender Name</label>
          <input type="text" id="senderName" placeholder="Your Name" style="padding: 8px; font-size: 0.8rem; margin-top: 4px;">
        </div>
        
        <div class="toggle-container">
          <label for="trackOpen">Enable Open Tracking</label>
          <input type="checkbox" id="trackOpen" checked>
        </div>
        
        <div id="webAppUrlContainer" style="margin-top: 12px; border-top: 1px solid var(--surface-border); padding-top: 12px;">
          <label for="webAppUrl">Tracking Proxy URL <span style="color:var(--error);font-size:10px;">(DO NOT use script.google.com)</span></label>
          <input type="text" id="webAppUrl" placeholder="https://track.yourdomain.com/" style="padding: 8px; font-size: 0.8rem; margin-top: 4px;">
          <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; margin-bottom: 0;">
            Must be a custom domain proxy (e.g. Cloudflare Worker) to avoid Google phishing bans.
          </p>
        </div>
        

        
        <div class="schedule-container">
          <label for="scheduleTime">Schedule Send (Optional)</label>
          <input type="datetime-local" id="scheduleTime" style="padding: 8px; font-size: 0.8rem; margin-top: 4px;">
        </div>
      </div>

      <div class="btn-group">
        <button id="sendBtn" disabled>Send Now</button>
        <button id="scheduleBtn" class="btn-secondary" disabled>Schedule</button>
      </div>
      <button id="syncBtn" class="btn-secondary full-btn">🔄 Sync Replies/Bounces</button>

      <div id="statusMsg" class="status hidden"></div>
    </div>
    
    <!-- ANALYTICS TAB -->
    <div id="analytics" class="tab-content">
      <div class="card">
        <canvas id="myChart" width="200" height="200"></canvas>
        <div class="stats-grid">
          <div class="stat-box"><div id="statSent" class="stat-val" style="color: #3b82f6;">0</div><div class="stat-lbl">Sent</div></div>
          <div class="stat-box"><div id="statOpened" class="stat-val" style="color: #10b981;">0</div><div class="stat-lbl">Opened</div></div>
          <div class="stat-box"><div id="statReplied" class="stat-val" style="color: #8b5cf6;">0</div><div class="stat-lbl">Replied</div></div>
          <div class="stat-box"><div id="statBounced" class="stat-val" style="color: #ef4444;">0</div><div class="stat-lbl">Bounced</div></div>
        </div>
        <button id="refreshStatsBtn" class="full-btn btn-secondary" style="margin-top: 16px;">Refresh Analytics</button>
      </div>
    </div>

    <script>
      let chartInstance = null;

      document.addEventListener('DOMContentLoaded', function() {
        // Tab switching logic
        document.querySelectorAll('.tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.target).classList.add('active');
            
            if (tab.dataset.target === 'analytics') {
              loadAnalytics();
            }
          });
        });

        loadData();
        
        document.getElementById('sendBtn').addEventListener('click', () => startMerge(false));
        document.getElementById('scheduleBtn').addEventListener('click', () => startMerge(true));
        document.getElementById('syncBtn').addEventListener('click', syncTracking);
        document.getElementById('refreshStatsBtn').addEventListener('click', loadAnalytics);
        
        const trackOpen = document.getElementById('trackOpen');
        const webAppUrlContainer = document.getElementById('webAppUrlContainer');
        trackOpen.addEventListener('change', function() {
          webAppUrlContainer.style.display = this.checked ? 'block' : 'none';
        });

      });

      function loadData() {
        google.script.run
          .withSuccessHandler(url => document.getElementById('webAppUrl').value = url || '')
          .getWebAppUrl();

        google.script.run
          .withSuccessHandler(function(headers) {
            const varsDiv = document.getElementById('variablesList');
            if (headers.length > 0) {
              varsDiv.innerHTML = headers.map(h => {
                let display = `{{${h}}}`;
                if (h.toLowerCase() === 'cc' || h.toLowerCase() === 'bcc' || h.toLowerCase().includes('attachment')) {
                  display = `<span style="color:var(--primary)">[${h}]</span>`;
                }
                return display;
              }).join(' ');
            } else {
              varsDiv.innerHTML = 'No columns found.';
            }
          })
          .getSheetHeaders();

        google.script.run
          .withSuccessHandler(function(drafts) {
            const select = document.getElementById('draftSelect');
            select.innerHTML = '';
            if (drafts.length === 0) {
              select.innerHTML = '<option value="">No drafts found</option>';
              return;
            }
            select.innerHTML = '<option value="">-- Choose a Draft --</option>';
            drafts.forEach(draft => {
              const opt = document.createElement('option');
              opt.value = draft.id;
              opt.textContent = draft.subject;
              select.appendChild(opt);
            });
            select.addEventListener('change', function() {
              const hasVal = !!this.value;
              document.getElementById('sendBtn').disabled = !hasVal;
              document.getElementById('scheduleBtn').disabled = !hasVal;
            });
          })
          .getGmailDrafts();
      }

      function getConfig() {
        const draftId = document.getElementById('draftSelect').value;
        const trackOpen = document.getElementById('trackOpen').checked;
        const webAppUrl = document.getElementById('webAppUrl').value.trim();
        const senderName = document.getElementById('senderName').value.trim();
        
        if (!draftId) return null;
        if (!senderName) { showError('Please enter a Sender Name.'); return null; }
        
        if (trackOpen) {
           if (!webAppUrl) { showError('Please paste your Tracking Proxy URL.'); return null; }
           if (webAppUrl.toLowerCase().includes('script.google.com')) {
              showError('Security Risk: Do NOT use a script.google.com URL directly or your account will be banned for phishing. Use a custom domain proxy.');
              return null;
           }
        }
        
        return { draftId, enableTracking: trackOpen, webAppUrl, senderName };
      }

      function startMerge(isScheduled) {
        const config = getConfig();
        if (!config) return;

        if (config.enableTracking) google.script.run.saveWebAppUrl(config.webAppUrl);



        const btn = document.getElementById(isScheduled ? 'scheduleBtn' : 'sendBtn');
        const statusDiv = document.getElementById('statusMsg');
        
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('scheduleBtn').disabled = true;
        
        btn.innerHTML = '<span class="loader"></span> ' + (isScheduled ? 'Scheduling...' : 'Sending...');
        statusDiv.className = 'status loading';
        statusDiv.classList.remove('hidden');

        if (isScheduled) {
          const scheduleTime = document.getElementById('scheduleTime').value;
          if (!scheduleTime) {
             showError('Please select a date and time.');
             resetBtns();
             return;
          }
          statusDiv.innerText = 'Scheduling background merge...';
          google.script.run
            .withSuccessHandler(res => {
              btn.innerHTML = 'Scheduled!';
              statusDiv.className = 'status success';
              statusDiv.innerText = `Merge scheduled for ${res.date}`;
              setTimeout(resetBtns, 5000);
            })
            .withFailureHandler(err => { showError(err); resetBtns(); })
            .scheduleMerge(config, scheduleTime);
        } else {
          statusDiv.innerText = 'Sending emails. Do not close...';
          google.script.run
            .withSuccessHandler(res => {
              btn.innerHTML = 'Complete!';
              statusDiv.className = 'status success';
              statusDiv.innerText = `Sent ${res.count} emails!`;
              setTimeout(resetBtns, 5000);
            })
            .withFailureHandler(err => { showError(err); resetBtns(); })
            .sendMailMerge(config);
        }
      }
      
      function resetBtns() {
        document.getElementById('sendBtn').innerHTML = 'Send Now';
        document.getElementById('scheduleBtn').innerHTML = 'Schedule';
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('scheduleBtn').disabled = false;
      }

      function syncTracking() {
        const btn = document.getElementById('syncBtn');
        const statusDiv = document.getElementById('statusMsg');
        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> Syncing...';
        statusDiv.className = 'status loading';
        statusDiv.innerText = 'Scanning inbox...';
        statusDiv.classList.remove('hidden');

        google.script.run
          .withSuccessHandler(res => {
            btn.innerHTML = '🔄 Sync Replies/Bounces';
            btn.disabled = false;
            statusDiv.className = 'status success';
            statusDiv.innerText = `Updated ${res.updatedCount} rows.`;
          })
          .withFailureHandler(err => {
            showError(err);
            btn.innerHTML = '🔄 Sync Replies/Bounces';
            btn.disabled = false;
          })
          .scanInboxForRepliesAndBounces();
      }

      function showError(error) {
        const msg = error.message || error;
        const statusDiv = document.getElementById('statusMsg');
        statusDiv.classList.remove('hidden');
        statusDiv.className = 'status error';
        statusDiv.innerText = msg;
      }
      
      function loadAnalytics() {
        const btn = document.getElementById('refreshStatsBtn');
        btn.innerHTML = '<span class="loader"></span> Loading...';
        
        google.script.run
          .withSuccessHandler(stats => {
            btn.innerHTML = 'Refresh Analytics';
            document.getElementById('statSent').innerText = stats.sent;
            document.getElementById('statOpened').innerText = stats.opened;
            document.getElementById('statReplied').innerText = stats.replied;
            document.getElementById('statBounced').innerText = stats.bounced;
            
            updateChart(stats);
          })
          .getAnalytics();
      }
      
      function updateChart(stats) {
        const ctx = document.getElementById('myChart').getContext('2d');
        const data = [stats.sent, stats.opened, stats.replied, stats.bounced, stats.error, stats.pending];
        
        if (chartInstance) {
          chartInstance.data.datasets[0].data = data;
          chartInstance.update();
        } else {
          chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: ['Sent', 'Opened', 'Replied', 'Bounced', 'Error', 'Pending'],
              datasets: [{
                data: data,
                backgroundColor: ['#3b82f6', '#10b981', '#8b5cf6', '#ef4444', '#f97316', '#475569'],
                borderWidth: 0,
                hoverOffset: 4
              }]
            },
            options: {
              responsive: true,
              cutout: '70%',
              plugins: {
                legend: { position: 'bottom', labels: { color: '#94a3b8', font: { family: 'Inter', size: 10 } } }
              }
            }
          });
        }
      }
    </script>
  </body>
</html>
